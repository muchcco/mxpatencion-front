<div class="confirm-modal" *ngIf="visible">
  <div class="confirm-modal__backdrop" (click)="cancelled.emit()"></div>
  <section class="confirm-modal__panel">
    <h3>{{ title }}</h3>
    <p>{{ description }}</p>

    <div class="actions-row">
      <button type="button" class="button" (click)="confirmed.emit()">
        {{ confirmLabel }}
      </button>
      <button type="button" class="button button--secondary" (click)="cancelled.emit()">
        {{ cancelLabel }}
      </button>
    </div>
  </section>
</div>
